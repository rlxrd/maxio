site_name: maxio
site_description: Асинхронный Python-фреймворк для MAX Bot API
site_url: https://maxio.readthedocs.io
repo_url: https://github.com/rlxrd/maxio
repo_name: rlxrd/maxio
edit_uri: edit/main/docs/

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

nav:
  - Главная: index.md
  - Руководство:
    - Быстрый старт: quickstart.md
    - Хэндлеры: handlers.md
    - Фильтры и F: filters.md
    - DI — зависимости: di.md
    - Middleware: middleware.md
    - Роутеры: routers.md
    - FSM: fsm.md
    - Клавиатуры: keyboards.md
    - Медиа: media.md
    - Управление чатами: chats.md
  - Справочник:
    - API: api.md
  - Changelog: changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
